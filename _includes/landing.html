<!-- 3D FPS Background Canvas -->
<canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;cursor:none;"></canvas>

<!-- ═══════════════════════════════════════════════════════════════
     YOUR ORIGINAL LANDING PAGE CONTENT — unchanged
════════════════════════════════════════════════════════════════ -->
<div class="row justify-content-center align-items-center p-4" style="position:relative;z-index:10;">
  <div class="col-lg-4 col-md-6 text-center mt-4">
    <div id="container" class="my-2">
      <div id="dummy"></div>
      <div id="element">
        <img src="{{ site.author.image }}" alt="{{ site.title }}" class="circle-image wow animated zoomIn" data-wow-delay=".1s">
      </div>
    </div>
    <p class="text-muted wow animated slideInUp" data-wow-delay=".15s">{{ site.description }}</p>
  </div>
</div>
<!-- ═══════════════════════════════════════════════════════════════ -->

<!-- FPS HUD Overlay -->
<div id="fps-hud" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;font-family:'Share Tech Mono',monospace;">

  <!-- Mouse-tracked crosshair -->
  <div id="crosshair" style="position:fixed;pointer-events:none;transform:translate(-50%,-50%);left:50%;top:50%;">
    <svg width="44" height="44" viewBox="0 0 44 44">
      <line x1="22" y1="2"  x2="22" y2="14" stroke="#00ff88" stroke-width="1.5" opacity="0.95"/>
      <line x1="22" y1="30" x2="22" y2="42" stroke="#00ff88" stroke-width="1.5" opacity="0.95"/>
      <line x1="2"  y1="22" x2="14" y2="22" stroke="#00ff88" stroke-width="1.5" opacity="0.95"/>
      <line x1="30" y1="22" x2="42" y2="22" stroke="#00ff88" stroke-width="1.5" opacity="0.95"/>
      <circle cx="22" cy="22" r="1.5" fill="#00ff88" opacity="0.95"/>
    </svg>
  </div>

  <!-- Hit marker (follows mouse) -->
  <div id="hitmarker" style="position:fixed;pointer-events:none;transform:translate(-50%,-50%);opacity:0;left:50%;top:50%;">
    <svg width="32" height="32" viewBox="0 0 32 32">
      <line x1="2"  y1="2"  x2="11" y2="11" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="30" y1="2"  x2="21" y2="11" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="2"  y1="30" x2="11" y2="21" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="30" y1="30" x2="21" y2="21" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Corner brackets -->
  <div style="position:absolute;top:18px;left:18px;width:36px;height:36px;border-top:1px solid rgba(0,255,136,0.45);border-left:1px solid rgba(0,255,136,0.45);"></div>
  <div style="position:absolute;top:18px;right:18px;width:36px;height:36px;border-top:1px solid rgba(0,255,136,0.45);border-right:1px solid rgba(0,255,136,0.45);"></div>
  <div style="position:absolute;bottom:18px;left:18px;width:36px;height:36px;border-bottom:1px solid rgba(0,255,136,0.45);border-left:1px solid rgba(0,255,136,0.45);"></div>
  <div style="position:absolute;bottom:18px;right:18px;width:36px;height:36px;border-bottom:1px solid rgba(0,255,136,0.45);border-right:1px solid rgba(0,255,136,0.45);"></div>

  <!-- Top center — something a real dev would write -->
  <div style="position:absolute;top:22px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;opacity:0.5;">
    <div style="width:50px;height:1px;background:rgba(0,255,136,0.5);"></div>
    <span style="color:#00ff88;font-size:9px;letter-spacing:0.3em;">TEST_GUN_COLLISION</span>
    <div style="width:50px;height:1px;background:rgba(0,255,136,0.5);"></div>
  </div>

  <!-- Kill feed top right -->
  <div id="killfeed" style="position:absolute;top:55px;right:28px;text-align:right;"></div>

  <!-- Bottom left: targets alive -->
  <div style="position:absolute;bottom:30px;left:28px;opacity:0.75;">
    <div style="color:#00ff88;font-size:26px;font-weight:bold;line-height:1;text-shadow:0 0 10px #00ff88;" id="hud-ammo">12</div>
    <div style="color:#4a9e6e;font-size:9px;letter-spacing:0.25em;margin-top:2px;">TARGETS</div>
  </div>

  <!-- Bottom right: kills -->
  <div style="position:absolute;bottom:30px;right:28px;text-align:right;opacity:0.75;">
    <div style="color:#ff6b35;font-size:9px;letter-spacing:0.25em;margin-bottom:4px;">KILLS</div>
    <div style="color:#ff6b35;font-size:26px;font-weight:bold;line-height:1;text-shadow:0 0 10px #ff6b35;" id="kill-count">0</div>
  </div>

  <!-- Bottom center: FPS -->
  <div style="position:absolute;bottom:30px;left:50%;transform:translateX(-50%);opacity:0.5;text-align:center;">
    <div style="color:#888;font-size:9px;letter-spacing:0.2em;">FPS</div>
    <div style="color:#ffffff;font-size:12px;" id="fps-counter">60</div>
  </div>

  <!-- Scanlines -->
  <div style="position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<script>
// ─── Scene ─────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.008);

const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 0, 38);

const renderer = new THREE.WebGLRenderer({
  canvas: document.querySelector('#bg-canvas'),
  antialias: true
});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);

// ─── Lighting ──────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const pL1 = new THREE.PointLight(0x00ff88, 2.0, 120); pL1.position.set(15, 15, 20);  scene.add(pL1);
const pL2 = new THREE.PointLight(0xff6b35, 1.2, 120); pL2.position.set(-15,-15, 15); scene.add(pL2);
const pL3 = new THREE.PointLight(0x0055ff, 0.8, 80);  pL3.position.set(0, 25,-10);   scene.add(pL3);

// ─── Grid floor ────────────────────────────────────────────────────────────
const grid = new THREE.GridHelper(200, 40, 0x00ff88, 0x001a0d);
grid.position.y = -16;
grid.material.transparent = true;
grid.material.opacity = 0.12;
scene.add(grid);

// ─── Raycaster ─────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouseNDC  = new THREE.Vector2(0, 0);

// ─── Target geometries & colors ────────────────────────────────────────────
const COLORS = [0x00ff88, 0xff6b35, 0x00aaff, 0xffcc00, 0xff3388, 0xaa55ff];
const GEOS = [
  new THREE.OctahedronGeometry(1.3),
  new THREE.BoxGeometry(2.0, 2.0, 2.0),
  new THREE.TetrahedronGeometry(1.5),
  new THREE.IcosahedronGeometry(1.2),
  new THREE.DodecahedronGeometry(1.2),
];

const targets   = [];
const particles = [];
const tracers   = [];
let   objCounter = 0; // global index so IDs are unique and never reused

// ─── Spawn target ──────────────────────────────────────────────────────────
function spawnTarget(fromEdge) {
  const col  = COLORS[Math.floor(Math.random() * COLORS.length)];
  const geo  = GEOS[Math.floor(Math.random() * GEOS.length)];
  const mat  = new THREE.MeshStandardMaterial({
    color: col, emissive: col, emissiveIntensity: 0.3,
    metalness: 0.7, roughness: 0.3,
  });
  const mesh = new THREE.Mesh(geo, mat);

  if (!fromEdge) {
    mesh.position.set((Math.random()-0.5)*50, (Math.random()-0.5)*24, -5 - Math.random()*18);
  } else {
    const side = Math.floor(Math.random() * 4);
    if      (side === 0) mesh.position.set(-30, (Math.random()-0.5)*18, -8 - Math.random()*14);
    else if (side === 1) mesh.position.set( 30, (Math.random()-0.5)*18, -8 - Math.random()*14);
    else if (side === 2) mesh.position.set((Math.random()-0.5)*50,  16, -8 - Math.random()*14);
    else                 mesh.position.set((Math.random()-0.5)*50, -16, -8 - Math.random()*14);
  }

  objCounter++;
  const id = `OBJECT_${String(objCounter).padStart(3, '0')}`;

  scene.add(mesh);
  targets.push({
    mesh, id, col,
    vx: (Math.random()-0.5) * 0.07,
    vy: (Math.random()-0.5) * 0.05,
    rx: (Math.random()-0.5) * 0.018,
    ry: (Math.random()-0.5) * 0.024,
    alive: true,
  });
}

for (let i = 0; i < 12; i++) spawnTarget(false);

// ─── Explosion particles ───────────────────────────────────────────────────
function explode(pos, col) {
  const count = 12 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const g = new THREE.OctahedronGeometry(0.1 + Math.random() * 0.28, 0);
    const m = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 1.0 });
    const mesh = new THREE.Mesh(g, m);
    mesh.position.copy(pos);
    scene.add(mesh);
    particles.push({
      mesh,
      vx: (Math.random()-0.5) * 0.55,
      vy: (Math.random()-0.5) * 0.55,
      vz: (Math.random()-0.5) * 0.35,
      rx: Math.random() * 0.12,
      ry: Math.random() * 0.12,
      life: 1.0,
      decay: 0.025 + Math.random() * 0.035,
    });
  }
}

// ─── Bullet tracer ─────────────────────────────────────────────────────────
function spawnTracer(from, to) {
  const geo  = new THREE.BufferGeometry().setFromPoints([from.clone(), to.clone()]);
  const mat  = new THREE.LineBasicMaterial({ color: 0xffee44, transparent: true, opacity: 1.0 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  tracers.push({ line, life: 1.0, decay: 0.14 });
}

// ─── Mouse & crosshair ─────────────────────────────────────────────────────
const crosshairEl = document.getElementById('crosshair');
const hitmarkerEl = document.getElementById('hitmarker');
let mouseX = innerWidth / 2, mouseY = innerHeight / 2;
let hitmarkerTimer = 0;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  crosshairEl.style.left = mouseX + 'px';
  crosshairEl.style.top  = mouseY + 'px';
  hitmarkerEl.style.left = mouseX + 'px';
  hitmarkerEl.style.top  = mouseY + 'px';

  mouseNDC.x =  (mouseX / innerWidth)  * 2 - 1;
  mouseNDC.y = -(mouseY / innerHeight) * 2 + 1;
});

// ─── Shoot ─────────────────────────────────────────────────────────────────
const killCountEl = document.getElementById('kill-count');
const hudAmmoEl   = document.getElementById('hud-ammo');
const killfeed    = document.getElementById('killfeed');
let killCount = 0;

function addKillfeed(id) {
  const el = document.createElement('div');
  el.style.cssText = 'color:#ff6b35;font-size:9px;letter-spacing:0.15em;margin-bottom:3px;opacity:1;transition:opacity 1.5s;white-space:nowrap;';
  el.textContent = `✕  ${id}  hit`;
  killfeed.prepend(el);
  setTimeout(() => el.style.opacity = '0', 200);
  setTimeout(() => el.remove(), 2000);
  while (killfeed.children.length > 6) killfeed.lastChild.remove();
}

document.addEventListener('click', () => {
  raycaster.setFromCamera(mouseNDC, camera);

  const liveMeshes = targets.filter(t => t.alive).map(t => t.mesh);
  const hits = raycaster.intersectObjects(liveMeshes);

  const gunOrigin = new THREE.Vector3(1.5, -1.5, 35);

  if (hits.length > 0) {
    const hitMesh = hits[0].object;
    const tgt = targets.find(t => t.mesh === hitMesh);
    if (tgt && tgt.alive) {
      tgt.alive = false;

      explode(hitMesh.position, hitMesh.material.color);
      spawnTracer(gunOrigin, hits[0].point);
      scene.remove(hitMesh);

      killCount++;
      killCountEl.textContent = killCount;
      addKillfeed(tgt.id);

      hitmarkerEl.style.opacity = '1';
      hitmarkerTimer = 0.2;

      setTimeout(() => {
        const idx = targets.indexOf(tgt);
        if (idx > -1) targets.splice(idx, 1);
        spawnTarget(true);
        hudAmmoEl.textContent = targets.filter(t => t.alive).length;
      }, 1500);

      hudAmmoEl.textContent = targets.filter(t => t.alive).length;
    }
  } else {
    // Miss — tracer into void
    const dir = raycaster.ray.direction.clone().multiplyScalar(65);
    const end = camera.position.clone().add(dir);
    spawnTracer(gunOrigin, end);
  }
});

// ─── FPS ───────────────────────────────────────────────────────────────────
let frames = 0, lastFpsT = performance.now();
const fpsEl = document.getElementById('fps-counter');

// ─── Main loop ─────────────────────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.01;

  frames++;
  const now = performance.now();
  if (now - lastFpsT > 700) {
    fpsEl.textContent = Math.round(frames / ((now - lastFpsT) / 1000));
    frames = 0; lastFpsT = now;
  }

  if (hitmarkerTimer > 0) {
    hitmarkerTimer -= 0.016;
    if (hitmarkerTimer <= 0) hitmarkerEl.style.opacity = '0';
  }

  pL1.intensity = 1.8 + Math.sin(t * 1.1) * 0.4;
  pL2.intensity = 1.0 + Math.cos(t * 0.8) * 0.3;

  for (const tgt of targets) {
    if (!tgt.alive) continue;
    tgt.mesh.position.x += tgt.vx;
    tgt.mesh.position.y += tgt.vy;
    tgt.mesh.rotation.x += tgt.rx;
    tgt.mesh.rotation.y += tgt.ry;
    if (tgt.mesh.position.x >  28 || tgt.mesh.position.x < -28) tgt.vx *= -1;
    if (tgt.mesh.position.y >  14 || tgt.mesh.position.y < -14) tgt.vy *= -1;
    tgt.mesh.material.emissiveIntensity = 0.2 + Math.sin(t * 2 + tgt.mesh.position.x) * 0.15;
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= p.decay;
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); continue; }
    p.mesh.position.x += p.vx;
    p.mesh.position.y += p.vy;
    p.mesh.position.z += p.vz;
    p.mesh.rotation.x += p.rx;
    p.mesh.rotation.y += p.ry;
    p.vy -= 0.009;
    p.mesh.material.opacity = p.life;
    const s = p.life * 0.7 + 0.3;
    p.mesh.scale.set(s, s, s);
  }

  for (let i = tracers.length - 1; i >= 0; i--) {
    tracers[i].life -= tracers[i].decay;
    tracers[i].line.material.opacity = tracers[i].life;
    if (tracers[i].life <= 0) { scene.remove(tracers[i].line); tracers.splice(i, 1); }
  }

  const b = 1 + Math.sin(t * 1.8) * 0.03;
  crosshairEl.style.transform = `translate(-50%,-50%) scale(${b})`;

  grid.position.z = (t * 0.4) % 5;

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

<style>
#bg-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
}
/* Hide default cursor over the whole page so crosshair takes over */
* { cursor: none !important; }
</style>
